# ============================================================
# TurtleBot3 Autonomous Pipeline — Parameters
# ============================================================

pipeline_node:
  ros__parameters:

    # --- Frontier Exploration ---
    min_frontier_size: 5            # cells — ignore tiny frontier clusters
    exploration_timeout: 300.0      # seconds (5 min) — max exploration time
    frontier_cost_weight: 0.5       # balance: higher = prefer closer frontiers
    no_frontier_patience: 3         # consecutive empty scans before stopping

    # --- A* Path Planning ---
    inflation_radius: 0.22          # metres (robot radius 0.14 + 0.08 margin)
    path_simplification: true       # remove collinear intermediate waypoints
    waypoint_spacing: 0.3           # metres — min distance between waypoints
    unknown_as_free: true           # treat unknown cells as free during exploration

    # --- Frontier Blacklist ---
    max_frontier_skip: 5            # max consecutive unreachable frontiers before reset
    frontier_blacklist_radius: 0.3  # metres — tolerance for blacklist matching

    # --- Execution ---
    max_replan_attempts: 3          # replan if waypoint execution fails
    waypoint_reached_tolerance: 0.10  # metres — tolerance for intermediate waypoints
