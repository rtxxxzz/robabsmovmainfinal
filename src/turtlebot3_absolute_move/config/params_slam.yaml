slam_toolbox:
  ros__parameters:

    # ============================================================
    # SLAM Toolbox — Online Async Mode
    # TurtleBot3 Absolute Move Integration
    # ============================================================
    # Mode: online_async — processes laser scans as they arrive
    # without buffering.  This is the standard mode for live
    # Gazebo simulation and real-hardware operation.

    # --- Solver ---
    solver_plugin: solver_plugins::CeresSolver
    ceres_linear_solver: SPARSE_NORMAL_CHOLESKY
    ceres_preconditioner: SCHUR_JACOBI
    ceres_trust_strategy: LEVENBERG_MARQUARDT
    ceres_dogleg_type: TRADITIONAL_DOGLEG
    ceres_loss_function: None

    # --- ROS interface ---
    odom_frame: odom
    map_frame: map
    base_frame: base_footprint
    scan_topic: /scan
    use_map_saver: true
    mode: mapping                     # mapping | localization

    # --- Scan matching ---
    debug_logging: false
    throttle_scans: 1
    transform_publish_period: 0.02    # seconds (50 Hz TF)
    map_update_interval: 5.0          # seconds between full map updates
    resolution: 0.05                  # meters per cell (5 cm)
    max_laser_range: 8.0              # meters — LDS-02 max 8m (Gazebo clips at 3.5m)
    minimum_time_interval: 0.5        # seconds between pose updates
    transform_timeout: 0.2
    tf_buffer_duration: 30.0
    stack_size_to_use: 40000000       # 40 MB

    # --- Loop closure ---
    enable_interactive_mode: false
    use_scan_matching: true
    use_scan_barycenter: true
    minimum_travel_distance: 0.05     # meters before adding a new node
    minimum_travel_heading: 0.1       # radians before adding a new node
    scan_buffer_size: 10
    scan_buffer_maximum_scan_distance: 10.0
    link_match_minimum_response_fine: 0.1
    distance_variance_penalty: 0.5
    angle_variance_penalty: 1.0

    fine_search_angle_offset: 0.00349 # radians
    coarse_search_angle_offset: 0.349
    coarse_angle_resolution: 0.0349
    minimum_angle_penalty: 0.9
    minimum_distance_penalty: 0.5
    use_response_expansion: true

    # --- Localization (used when mode: localization) ---
    localization_maximum_search_radius: 1.0
    localization_maximum_search_angle: 0.1
