# ============================================================
# TurtleBot3 Absolute Move — Simulation Parameters
# ============================================================

absolute_move_node:
  ros__parameters:

    # --- Speed limits (kept low — prevents Gazebo physics instability) ---
    max_linear_speed: 0.15        # m/s  (HW max 0.22)
    max_angular_speed: 0.8        # rad/s (HW max 2.84 — DO NOT raise above 1.0 in sim)

    # --- Tolerances ---
    position_tolerance: 0.05      # meters (5 cm)
    heading_tolerance: 0.05       # radians (~2.9°)

    # --- Proportional gains ---
    kp_linear: 1.0
    kp_angular: 1.5

    # --- Control loop rate ---
    control_rate: 30.0            # Hz

    # --- Stuck detection ---
    stuck_timeout: 5.0            # seconds before triggering recovery
    stuck_distance: 0.03          # metres of progress required per window

    # --- Recovery maneuver (back-up when stuck) ---
    max_recovery_attempts: 3      # back-up attempts before aborting
    recovery_backup_speed: 0.05   # m/s backward
    recovery_backup_time: 1.5     # seconds to reverse

    # --- LiDAR obstacle avoidance (TurtleBot3 Burger, LDS-01/02) ---
    obstacle_distance: 0.35       # metres — stop forward motion if obstacle closer
    obstacle_angle_deg: 45.0      # degrees — half-angle of forward detection cone

    # --- Tilt / tipover detection & Gazebo reset ---
    tilt_threshold_deg: 40.0      # degrees of combined roll+pitch = tipped
    use_gazebo_reset: true        # call /gazebo/set_entity_state to stand back up

    # --- Simulation time ---
    use_sim_time: true
